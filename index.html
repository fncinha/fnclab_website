<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>유동소음제어연구실 · Flow Noise Control Laboratory</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; background: oklch(0.985 0.008 85); }
  #app { min-height: 100vh; }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="lab-tokens.jsx"></script>
<script type="text/babel" src="site-pages.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

// Hash router: #/home, #/about, #/research, #/research/:id, #/projects, #/publications
function parseHash() {
  const h = (window.location.hash || '#/home').replace(/^#\/?/, '');
  const parts = h.split('/').filter(Boolean);
  return { page: parts[0] || 'home', sub: parts[1] || null };
}

function App() {
  const [route, setRoute] = useState(parseHash());
  // English is the site default. We intentionally do NOT read a stored
  // language here so every visitor lands on English first; switching to KO
  // still works for the rest of the session.
  const [lang, setLang] = useState('en');
  const [content, setContent] = useState({ ko: null, en: null });
  const [anim, setAnim] = useState('in'); // 'in' | 'out'

  window.__fncLang = lang;
  window.__fncSetLang = (L) => { setLang(L); localStorage.setItem('fnc-lang', L); };

  useEffect(() => {
    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const onHash = () => {
      const next = parseHash();
      if (reduce) { setRoute(next); window.scrollTo(0, 0); return; }
      setAnim('out');
      setTimeout(() => {
        setRoute(next);
        window.scrollTo(0, 0);
        setAnim('in');
      }, 180);
    };
    window.addEventListener('hashchange', onHash);
    if (!window.location.hash) window.location.hash = '#/home';
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => {
    Promise.all([
      fetch('data/content.ko.json').then(r => r.json()),
      fetch('data/content.en.json').then(r => r.json()),
    ]).then(([ko, en]) => setContent({ ko, en }));
  }, []);

  useEffect(() => {
    document.documentElement.lang = lang;
  }, [lang]);

  if (!content.ko) {
    return (
      <div style={{ position: 'fixed', inset: 0, display: 'flex', alignItems: 'center',
        justifyContent: 'center', fontFamily: 'Pretendard, system-ui, sans-serif',
        color: '#888', fontSize: 14 }}>
        loading…
      </div>
    );
  }

  const c = content[lang];
  const { page, sub } = route;

  let body;
  switch (page) {
    case 'home':         body = <HomePage c={c} />; break;
    case 'about':        body = <AboutPage c={c} />; break;
    case 'research':
      body = sub ? <ResearchDetailPage c={c} id={sub} /> : <ResearchPage c={c} />; break;
    case 'projects':     body = <ProjectsPage c={c} />; break;
    case 'publications': body = <PublicationsPage c={c} />; break;
    default:             body = <NotFound c={c} />;
  }

  return (
    <div className="fnc-page" style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <FNCNav c={c} active={page} />
      <main
        style={{ flex: 1,
          opacity: anim === 'out' ? 0 : 1,
          transform: anim === 'out' ? 'translateY(8px)' : 'translateY(0)',
          transition: 'opacity 0.34s cubic-bezier(0.22,0.61,0.36,1), transform 0.34s cubic-bezier(0.22,0.61,0.36,1)' }}
      >{body}</main>
      <FNCFooter c={c} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
